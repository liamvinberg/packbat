name: publish

on:
  push:
    branches: [main]

jobs:
  release-please:
    if: github.repository == 'liamvinberg/packbat'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['apps/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['apps/cli--tag_name'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/cli typecheck
      - run: pnpm -C apps/cli test
      - run: pnpm check
      - run: pnpm release:check
        env:
          PACKBAT_DROPBOX_APP_KEY: ${{ secrets.PACKBAT_DROPBOX_APP_KEY }}
          PACKBAT_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.PACKBAT_GOOGLE_DRIVE_CLIENT_ID }}
          PACKBAT_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.PACKBAT_GOOGLE_DRIVE_CLIENT_SECRET }}
          PACKBAT_RELEASE_BUILD: "1"
      - run: npm publish
        working-directory: apps/cli
